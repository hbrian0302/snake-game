<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WASD 스네이크: 모바일 지원</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #0f172a; overflow: hidden; font-family: 'Pretendard', sans-serif; color: white; touch-action: none; }
        canvas { background-color: #1e293b; box-shadow: 0 0 50px rgba(0,0,0,0.5); width: 100%; height: 100%; }
        .ui { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; }
        .score { font-size: 20px; font-weight: bold; color: #fbbf24; }
        .info { font-size: 12px; opacity: 0.8; margin-top: 5px; }
        
        /* 모바일 컨트롤러 스타일 */
        .controls { 
            position: absolute; bottom: 40px; right: 40px; 
            display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(2, 60px); gap: 10px;
            z-index: 20;
        }
        .btn {
            width: 60px; height: 60px; background: rgba(255, 255, 255, 0.2); 
            border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-weight: bold; color: white;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(255, 255, 255, 0.5); transform: scale(0.9); }
        .btn-up { grid-column: 2; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        #gameOver { position: absolute; display: none; flex-direction: column; align-items: center; background: rgba(0,0,0,0.9); padding: 30px; border-radius: 20px; text-align: center; border: 2px solid #ef4444; z-index: 100; width: 80%; max-width: 300px; }
        button.restart { margin-top: 20px; padding: 12px 30px; font-size: 18px; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="ui">
        <div class="score">Score: <span id="scoreVal">0</span></div>
        <div class="info">WASD 또는 화살표 터치로 조종하세요!</div>
    </div>

    <!-- 모바일 터치 컨트롤러 -->
    <div class="controls">
        <div class="btn btn-up" id="btnW">W</div>
        <div class="btn btn-left" id="btnA">A</div>
        <div class="btn btn-down" id="btnS">S</div>
        <div class="btn btn-right" id="btnD">D</div>
    </div>

    <div id="gameOver">
        <h1 id="deathMsg">GAME OVER</h1>
        <p>최종 점수: <span id="finalScore">0</span></p>
        <button class="restart" onclick="resetGame()">다시 도전</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreVal');
        const finalScoreElement = document.getElementById('finalScore');
        const gameOverScreen = document.getElementById('gameOver');
        const deathMsg = document.getElementById('deathMsg');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let score = 0;
        let gameActive = true;
        let keys = {};
        let frameCount = 0;

        class Snake {
            constructor(x, y, color, isPlayer = false) {
                this.isPlayer = isPlayer;
                this.segments = [];
                this.angle = Math.random() * Math.PI * 2;
                this.speed = isPlayer ? 4 : 2 + Math.random() * 2;
                this.baseRadius = isPlayer ? 12 : 8 + Math.random() * 15;
                this.length = isPlayer ? 15 : 10 + Math.random() * 15;
                this.color = color;
                this.turnSpeed = 0.12;

                for (let i = 0; i < this.length; i++) {
                    this.segments.push({ x: x, y: y });
                }
            }

            update(targetAngle) {
                if (targetAngle !== undefined) {
                    let angleDiff = targetAngle - this.angle;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    this.angle += angleDiff * this.turnSpeed;
                }

                const head = this.segments[0];
                const nextX = head.x + Math.cos(this.angle) * this.speed;
                const nextY = head.y + Math.sin(this.angle) * this.speed;

                this.segments.unshift({ x: nextX, y: nextY });
                if (this.segments.length > this.length * 3) {
                    this.segments.pop();
                }

                if (this.isPlayer) {
                    if (nextX < 0 || nextX > canvas.width || nextY < 0 || nextY > canvas.height) {
                        endGame("벽에 부딪혔습니다!");
                    }
                } else {
                    if (nextX < -100) this.segments[0].x = canvas.width + 100;
                    if (nextX > canvas.width + 100) this.segments[0].x = -100;
                    if (nextY < -100) this.segments[0].y = canvas.height + 100;
                    if (nextY > canvas.height + 100) this.segments[0].y = -100;
                }
            }

            draw() {
                for (let i = Math.floor(this.length) - 1; i >= 0; i--) {
                    const segIndex = i * 3;
                    if (segIndex >= this.segments.length) continue;
                    const segment = this.segments[segIndex];
                    const radius = this.baseRadius * (1 - (i / (this.length * 2)));
                    
                    ctx.beginPath();
                    ctx.arc(segment.x, segment.y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = i === 0 ? (this.isPlayer ? "#fbbf24" : "#ef4444") : this.color;
                    ctx.fill();
                }
            }
        }

        let player;
        let enemies = [];
        let foods = [];

        function initGame() {
            player = new Snake(canvas.width / 2, canvas.height / 2, "#10b981", true);
            enemies = [];
            foods = Array.from({ length: 30 }, () => spawnItem());
            score = 0;
            gameActive = true;
            gameOverScreen.style.display = 'none';
        }

        function spawnItem() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: 5 + Math.random() * 5,
                color: `hsl(${Math.random() * 360}, 70%, 60%)`
            };
        }

        // 키보드 이벤트
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // 터치 버튼 이벤트
        const touchControls = { 'w': false, 'a': false, 's': false, 'd': false };
        const setupBtn = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); touchControls[key] = true; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); touchControls[key] = false; });
            el.addEventListener('mousedown', () => touchControls[key] = true);
            el.addEventListener('mouseup', () => touchControls[key] = false);
        };
        setupBtn('btnW', 'w'); setupBtn('btnA', 'a'); setupBtn('btnS', 's'); setupBtn('btnD', 'd');

        function update() {
            if (!gameActive) return;

            let targetAngle = player.angle;
            const w = keys['w'] || touchControls['w'];
            const a = keys['a'] || touchControls['a'];
            const s = keys['s'] || touchControls['s'];
            const d = keys['d'] || touchControls['d'];

            if (w && a) targetAngle = -Math.PI * 0.75;
            else if (w && d) targetAngle = -Math.PI * 0.25;
            else if (s && a) targetAngle = Math.PI * 0.75;
            else if (s && d) targetAngle = Math.PI * 0.25;
            else if (w) targetAngle = -Math.PI / 2;
            else if (s) targetAngle = Math.PI / 2;
            else if (a) targetAngle = Math.PI;
            else if (d) targetAngle = 0;
            
            player.update(targetAngle);

            enemies.forEach(enemy => {
                if (Math.random() < 0.02) enemy.targetAngle = Math.random() * Math.PI * 2;
                enemy.update(enemy.targetAngle);
            });

            const pHead = player.segments[0];

            // 음식 먹기
            foods.forEach((food, i) => {
                if (Math.hypot(pHead.x - food.x, pHead.y - food.y) < player.baseRadius + food.radius) {
                    foods[i] = spawnItem();
                    score += 10;
                    player.length += 0.5;
                    player.baseRadius += 0.1;
                }
            });

            // 적 충돌
            enemies.forEach((enemy, i) => {
                const eHead = enemy.segments[0];
                const dist = Math.hypot(pHead.x - eHead.x, pHead.y - eHead.y);
                if (dist < player.baseRadius + enemy.baseRadius) {
                    if (player.baseRadius > enemy.baseRadius) {
                        enemies.splice(i, 1);
                        score += 50;
                        player.length += 2;
                    } else {
                        endGame("더 큰 뱀에게 먹혔습니다!");
                    }
                }
            });

            if (frameCount % 300 === 0 && enemies.length < 5) {
                enemies.push(new Snake(Math.random() * canvas.width, Math.random() * canvas.height, "#ef4444"));
            }

            scoreElement.innerText = score;
            draw();
            frameCount++;
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            foods.forEach(f => { ctx.beginPath(); ctx.arc(f.x, f.y, f.radius, 0, Math.PI*2); ctx.fillStyle = f.color; ctx.fill(); });
            enemies.forEach(e => e.draw());
            player.draw();
        }

        function endGame(msg) {
            gameActive = false;
            deathMsg.innerText = msg;
            finalScoreElement.innerText = score;
            gameOverScreen.style.display = 'flex';
        }

        function resetGame() { initGame(); update(); }

        initGame();
        update();
    </script>
</body>
</html>

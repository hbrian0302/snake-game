<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASD ?ㅻ꽕?댄겕: ?쎌쑁媛뺤떇 ?쒖뒪??/title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #0f172a; overflow: hidden; font-family: 'Pretendard', sans-serif; color: white; }
        canvas { background-color: #1e293b; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .score { font-size: 24px; font-weight: bold; color: #fbbf24; }
        .info { font-size: 14px; opacity: 0.8; margin-top: 5px; }
        #gameOver { position: absolute; display: none; flex-direction: column; align-items: center; background: rgba(0,0,0,0.9); padding: 40px; border-radius: 20px; text-align: center; border: 2px solid #ef4444; z-index: 100; }
        button { margin-top: 20px; padding: 12px 30px; font-size: 18px; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="ui">
        <div class="score">Score: <span id="scoreVal">0</span></div>
        <div class="info">WASD ?대룞 | ?섎낫???묒? 諭? 紐명넻???ㅼ씠諛쏆븘 癒뱀쓣 ???덉뒿?덈떎!</div>
    </div>

    <div id="gameOver">
        <h1 id="deathMsg">GAME OVER</h1>
        <p>理쒖쥌 ?먯닔: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">?ㅼ떆 ?꾩쟾</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreVal');
        const finalScoreElement = document.getElementById('finalScore');
        const gameOverScreen = document.getElementById('gameOver');
        const deathMsg = document.getElementById('deathMsg');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameActive = true;
        let keys = {};
        let frameCount = 0;

        class Snake {
            constructor(x, y, color, isPlayer = false) {
                this.isPlayer = isPlayer;
                this.segments = [];
                this.angle = Math.random() * Math.PI * 2;
                this.speed = isPlayer ? 5 : 2 + Math.random() * 3;
                this.baseRadius = isPlayer ? 15 : 8 + Math.random() * 20; // ?ㅼ뼇???ш린????
                this.length = isPlayer ? 15 : 10 + Math.random() * 20;
                this.color = color;
                this.turnSpeed = 0.08;
                this.targetAngle = this.angle;

                for (let i = 0; i < this.length; i++) {
                    this.segments.push({ x: x, y: y });
                }
            }

            update(target) {
                if (target !== undefined) {
                    let angleDiff = target - this.angle;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    this.angle += angleDiff * this.turnSpeed;
                }

                const head = this.segments[0];
                const nextX = head.x + Math.cos(this.angle) * this.speed;
                const nextY = head.y + Math.sin(this.angle) * this.speed;

                this.segments.unshift({ x: nextX, y: nextY });
                if (this.segments.length > this.length * 3) {
                    this.segments.pop();
                }

                // ?붾㈃ 寃쎄퀎 泥섎━
                if (this.isPlayer) {
                    if (nextX < 0 || nextX > canvas.width || nextY < 0 || nextY > canvas.height) {
                        endGame("踰쎌뿉 遺?ろ삍?듬땲??");
                    }
                } else {
                    if (nextX < -100) this.segments[0].x = canvas.width + 100;
                    if (nextX > canvas.width + 100) this.segments[0].x = -100;
                    if (nextY < -100) this.segments[0].y = canvas.height + 100;
                    if (nextY > canvas.height + 100) this.segments[0].y = -100;
                }
            }

            draw() {
                for (let i = Math.floor(this.length) - 1; i >= 0; i--) {
                    const segIndex = i * 3;
                    if (segIndex >= this.segments.length) continue;
                    const segment = this.segments[segIndex];
                    const radius = this.baseRadius * (1 - (i / (this.length * 2)));
                    
                    ctx.beginPath();
                    ctx.arc(segment.x, segment.y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = i === 0 ? (this.isPlayer ? "#fbbf24" : "#ef4444") : this.color;
                    ctx.fill();
                    
                    if (i === 0) {
                        ctx.fillStyle = "white";
                        ctx.beginPath();
                        ctx.arc(segment.x + Math.cos(this.angle + 0.5) * (radius*0.5), segment.y + Math.sin(this.angle + 0.5) * (radius*0.5), radius/3, 0, Math.PI*2);
                        ctx.arc(segment.x + Math.cos(this.angle - 0.5) * (radius*0.5), segment.y + Math.sin(this.angle - 0.5) * (radius*0.5), radius/3, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
            }
        }

        let player;
        let enemies = [];
        let foods = [];
        let bombs = [];

        function initGame() {
            player = new Snake(canvas.width / 2, canvas.height / 2, "#10b981", true);
            enemies = [];
            foods = Array.from({ length: 40 }, () => spawnItem('food'));
            bombs = [spawnItem('bomb')];
            score = 0;
            gameActive = true;
            gameOverScreen.style.display = 'none';
        }

        function spawnItem(type) {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: type === 'food' ? 5 + Math.random() * 5 : 15,
                color: type === 'food' ? `hsl(${Math.random() * 360}, 70%, 60%)` : "#000",
                type: type
            };
        }

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function checkCollision(head, targetSnake) {
            // ?寃?諭??紐⑤뱺 留덈뵒? 異⑸룎 泥댄겕 (癒몃━遺??瑗щ━源뚯?)
            for (let i = 0; i < targetSnake.length; i++) {
                const segIndex = i * 3;
                if (segIndex >= targetSnake.segments.length) continue;
                const seg = targetSnake.segments[segIndex];
                const dist = Math.hypot(head.x - seg.x, head.y - seg.y);
                
                // 留덈뵒??諛섏?由꾩쓣 怨좊젮??異⑸룎 ?먯젙
                const targetRadius = targetSnake.baseRadius * (1 - (i / (targetSnake.length * 2)));
                if (dist < player.baseRadius * 0.8 + targetRadius * 0.8) {
                    return true;
                }
            }
            return false;
        }

        function update() {
            if (!gameActive) return;

            // 1. ?뚮젅?댁뼱 議곗옉
            let targetAngle = player.angle;
            if (keys['w'] && keys['a']) targetAngle = -Math.PI * 0.75;
            else if (keys['w'] && keys['d']) targetAngle = -Math.PI * 0.25;
            else if (keys['s'] && keys['a']) targetAngle = Math.PI * 0.75;
            else if (keys['s'] && keys['d']) targetAngle = Math.PI * 0.25;
            else if (keys['w']) targetAngle = -Math.PI / 2;
            else if (keys['s']) targetAngle = Math.PI / 2;
            else if (keys['a']) targetAngle = Math.PI;
            else if (keys['d']) targetAngle = 0;
            player.update(targetAngle);

            // 2. ??AI ?낅뜲?댄듃
            enemies.forEach(enemy => {
                if (Math.random() < 0.02) enemy.targetAngle = Math.random() * Math.PI * 2;
                enemy.update(enemy.targetAngle);
            });

            const pHead = player.segments[0];

            // 3. ?뚮젅?댁뼱 vs ???곹샇?묒슜 (?꾩껜 紐명넻 泥댄겕)
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                
                // ?뚮젅?댁뼱 癒몃━媛 ?곸쓽 紐명넻 ?대뵒???우븯?붽??
                if (checkCollision(pHead, enemy)) {
                    if (player.baseRadius > enemy.baseRadius) {
                        // ?뚮젅?댁뼱媛 ???щ㈃ ?곸쓣 癒뱀쓬
                        score += Math.floor(enemy.baseRadius * 10);
                        player.length += enemy.length * 0.2;
                        player.baseRadius += 1;
                        enemies.splice(i, 1);
                        continue;
                    } else {
                        // ?뚮젅?댁뼱媛 ???묒쑝硫??щ쭩
                        endGame("??嫄곕????곸뿉寃?癒뱁삍?듬땲??");
                        return;
                    }
                }

                // ?곸쓽 癒몃━媛 ?뚮젅?댁뼱??紐명넻 ?대뵒???우븯?붽??
                const eHead = enemy.segments[0];
                if (Math.hypot(eHead.x - pHead.x, eHead.y - pHead.y) < enemy.baseRadius + player.baseRadius) {
                   // 癒몃━?쇰━ 遺?ろ엺 寃쎌슦???꾩뿉???대? 泥섎━??(checkCollision ?대???癒몃━ ?ы븿)
                } else {
                    // ??癒몃━媛 ?뚮젅?댁뼱 紐명넻(癒몃━ ?쒖쇅)???우븯?붿? 泥댄겕
                    for (let j = 5; j < player.segments.length; j += 5) {
                        const pSeg = player.segments[j];
                        if (Math.hypot(eHead.x - pSeg.x, eHead.y - pSeg.y) < enemy.baseRadius + player.baseRadius * 0.5) {
                            if (enemy.baseRadius > player.baseRadius) {
                                endGame("?곸씠 ?뱀떊???녾뎄由щ? 怨듦꺽???≪븘癒뱀뿀?듬땲??");
                                return;
                            } else {
                                enemies.splice(i, 1);
                                score += 50;
                                break;
                            }
                        }
                    }
                }
            }

            // 4. ?꾩씠??異⑸룎
            foods.forEach((food, i) => {
                if (Math.hypot(pHead.x - food.x, pHead.y - food.y) < player.baseRadius + food.radius) {
                    foods[i] = spawnItem('food');
                    score += 10;
                    player.length += 1;
                    player.baseRadius += 0.2;
                }
            });

            bombs.forEach((bomb, i) => {
                if (Math.hypot(pHead.x - bomb.x, pHead.y - bomb.y) < player.baseRadius + bomb.radius) {
                    enemies = [];
                    bombs[i] = spawnItem('bomb');
                    score += 100;
                }
            });

            // ?먯떊怨?異⑸룎
            for (let i = 40; i < player.segments.length; i += 5) {
                if (Math.hypot(pHead.x - player.segments[i].x, pHead.y - player.segments[i].y) < player.baseRadius * 0.7) {
                    endGame("?먯떊??紐몄뿉 遺?ろ삍?듬땲??");
                }
            }

            if (frameCount % 180 === 0 && enemies.length < 6) {
                enemies.push(new Snake(Math.random() * canvas.width, Math.random() * canvas.height, `hsl(${Math.random() * 60}, 70%, 40%)`));
            }

            scoreElement.innerText = score;
            draw();
            frameCount++;
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            foods.forEach(f => { ctx.beginPath(); ctx.arc(f.x, f.y, f.radius, 0, Math.PI*2); ctx.fillStyle = f.color; ctx.fill(); });
            bombs.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
                ctx.fillStyle = (frameCount % 20 < 10) ? "#000" : "#ef4444";
                ctx.fill(); ctx.strokeStyle = "white"; ctx.stroke();
            });
            enemies.forEach(e => e.draw());
            player.draw();
        }

        function endGame(msg) {
            gameActive = false;
            deathMsg.innerText = msg;
            finalScoreElement.innerText = score;
            gameOverScreen.style.display = 'flex';
        }

        function resetGame() { initGame(); update(); }

        initGame();
        update();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>
